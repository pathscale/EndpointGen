[package]
name = "my-service"
version = "0.1.0"
edition = "2021"

# These dependencies are required for the code generated by endpoint-gen
[dependencies]
endpoint-libs = "1.3.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
num-derive = "0.4"
strum_macros = "0.26"
tokio = { version = "1", features = ["full"] }
schemars = "1.2"                                       # Required if using json_schema_gen in endpoint-gen config
